version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: squadkeeper_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: squadkeeper
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - squadkeeper_network

  redis:
    image: redis:alpine
    container_name: squadkeeper_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - squadkeeper_network

volumes:
  postgres_data:
  redis_data:

networks:
  squadkeeper_network:
    driver: bridge
